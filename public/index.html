<!DOCTYPE html>
<html lang="en" ng-app="auctionApp">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BidVault — Live Auction Platform</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

    <!-- Socket.io client (auto-served by socket.io server) -->
    <script src="/socket.io/socket.io.js"></script>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="light-theme">

    <!-- ── NAVBAR ── -->
    <nav class="navbar" ng-controller="NavController">
        <a href="#!/" class="nav-brand">BID<span>VAULT</span></a>

        <div class="nav-links">
            <a href="#!/auctions">Auctions</a>
            <a href="#!/auctions?status=active" class="live-badge">● LIVE</a>
            <button class="btn btn-ghost" ng-click="toggleTheme()" style="padding: 0.25rem 0.5rem; font-size: 1.25rem;">
                {{ isLightMode ? '🌙' : '☀️' }}
            </button>
        </div>

        <div class="nav-auth">
            <div ng-if="!isLoggedIn()">
                <a href="#!/login" class="btn btn-ghost">Login</a>
                <a href="#!/register" class="btn btn-primary">Register</a>
            </div>
            <div ng-if="isLoggedIn()" class="nav-user">
                <a href="#!/create-auction" class="btn btn-primary">+ List Item</a>
                <div class="user-menu">
                    <button class="user-btn" ng-click="toggleMenu()">
                        <span class="avatar">{{ currentUser().username[0].toUpperCase() }}</span>
                        {{ currentUser().username }}
                    </button>
                    <div class="dropdown" ng-show="menuOpen">
                        <a href="#!/dashboard" ng-click="menuOpen=false">Dashboard</a>
                        <a href="#!/profile" ng-click="menuOpen=false">Profile</a>
                        <hr />
                        <a href="#" ng-click="logout()">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- ── PAGE ── -->
    <main class="main-content">
        <div ng-view></div>
    </main>

    <!-- ── FOOTER ── -->
    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">BIDVAULT</span>
        </div>
    </footer>

    <!-- ── Scripts (ORDER MATTERS) ── -->
    <script src="app.js"></script>

    <!-- Services first -->
    <script src="services/auth.service.js"></script>
    <script src="services/auction.service.js"></script>
    <script src="services/socket.service.js"></script>
    <script src="services/validation.service.js"></script>
    <script src="services/currency.service.js"></script>

    <!-- Controllers after -->
    <script src="controllers/nav.controller.js"></script>
    <script src="controllers/home.controller.js"></script>
    <script src="controllers/auth.controller.js"></script>
    <script src="controllers/auction.controller.js"></script>
    <script src="controllers/bid.controller.js"></script>
    <script src="controllers/dashboard.controller.js"></script>
</body>

</html>
