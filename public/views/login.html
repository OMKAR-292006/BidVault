<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">🔨 BID<span>VAULT</span></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Enter your details to access your account.</p>
        
        <div ng-if="error" class="alert alert-error">{{error}}</div>

        <form class="auth-form" ng-submit="login()">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" ng-model="formData.email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" ng-model="formData.password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-full" ng-disabled="loading">
                {{loading ? 'Signing in...' : 'Sign In'}}
            </button>
        </form>
        
        <div class="auth-switch">
            Don't have an account? <a href="#!/register">Create one</a>
        </div>
    </div>
</div>
