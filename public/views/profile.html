<div class="form-page">
    <div class="form-page-header">
        <h1>Profile Settings</h1>
        <p>Manage your account details and personal information.</p>
    </div>

    <div class="form-card">
        <div ng-if="success" class="alert alert-success">{{success}}</div>
        <div ng-if="error" class="alert alert-error">{{error}}</div>

        <form class="auth-form" ng-submit="save()">
            <div class="form-section-title">Personal Details</div>
            
            <div class="form-row-2">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" ng-model="formData.full_name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" ng-model="formData.phone">
                </div>
            </div>
            
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea ng-model="formData.address" rows="3"></textarea>
            </div>
            
            <div class="form-section-title" style="margin-top:1rem;">Account Security</div>
            <p style="font-size: 13px; color: var(--muted); margin-bottom: 0.5rem;">Leave password blank to keep your current password.</p>
            
            <div class="form-row-2">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" ng-model="formData.password" placeholder="••••••••">
                </div>
            </div>

            <div class="form-actions" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" ng-disabled="loading">
                    {{loading ? 'Saving...' : 'Save Changes'}}
                </button>
            </div>
        </form>
    </div>
</div>
